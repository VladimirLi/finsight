name: CI

on:
  push:
    branches: [main, dev]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (ruff · mypy · pyright · vulture · bandit · pip-audit · pytest · drift)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      # Mirror the local layout (.venv) so pyright's venv config resolves identically.
      - name: Install dependencies
        run: |
          python -m venv .venv
          .venv/bin/pip install -U pip
          .venv/bin/pip install -r requirements-dev.txt

      - name: Ruff (lint)
        run: .venv/bin/ruff check app tests scripts
      - name: Ruff (format check)
        run: .venv/bin/ruff format --check app tests scripts
      - name: mypy (strict)
        run: .venv/bin/mypy app
      - name: pyright (strict)
        run: .venv/bin/pyright app
      - name: Vulture (dead code)
        run: .venv/bin/vulture
      - name: Bandit (SAST)
        run: .venv/bin/bandit -c pyproject.toml -r app -q
      - name: pip-audit (dependency vulnerabilities)
        run: .venv/bin/pip-audit
      - name: pytest (+ coverage gate)
        run: .venv/bin/pytest --cov=app --cov-report=term-missing --cov-fail-under=85
      - name: OpenAPI drift gate
        run: |
          .venv/bin/python scripts/export_openapi.py
          git diff --exit-code openapi.json \
            || (echo "::error::openapi.json is stale — run 'make openapi' and commit" && exit 1)
      - name: Alembic migration drift gate
        env:
          DATABASE_URL: "sqlite:///./_ci_drift.db"
        run: |
          .venv/bin/alembic upgrade head
          .venv/bin/alembic check
          rm -f _ci_drift.db
      - name: Build docs (mkdocs --strict)
        run: .venv/bin/mkdocs build --strict
      - name: Dependency lock drift gate (Python 3.13)
        run: |
          pip install "pip-tools>=7.4"
          pip-compile -q --generate-hashes --strip-extras --allow-unsafe -o requirements.lock requirements.txt
          pip-compile -q --generate-hashes --strip-extras --allow-unsafe -o requirements-dev.lock requirements-dev.txt
          git diff --exit-code requirements.lock requirements-dev.lock \
            || (echo "::error::dependency locks are stale — run 'make lock' and commit" && exit 1)

  frontend:
    name: Frontend (eslint · tsc · prettier · vitest · knip · audit · build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: OpenAPI types drift gate
        run: |
          npm run gen:api-types
          git diff --exit-code src/api/openapi.d.ts \
            || (echo "::error::openapi.d.ts is stale — run 'npm run gen:api-types' and commit" && exit 1)
      - name: ESLint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Prettier (format check)
        run: npm run format:check
      - name: Vitest (+ coverage thresholds)
        run: npm run test:cov
      - name: Knip (dead code)
        run: npm run knip
      - name: npm audit (high+)
        run: npm run audit
      - name: Build
        run: npm run build
      - name: Bundle-size budget
        run: npm run size

  quality:
    name: Quality (gitleaks · codespell · cspell)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks (secret scan)
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: codespell
        run: pipx run codespell --config .codespellrc backend/app frontend/src README.md
      - name: cspell
        run: npx --yes cspell "**/*.{py,ts,tsx,md}" --config cspell.json --no-progress

  docker:
    name: Docker (hadolint · trivy fs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Hadolint (backend Dockerfile)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: backend/Dockerfile
          config: .hadolint.yaml
      - name: Hadolint (frontend Dockerfile)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: frontend/Dockerfile
          config: .hadolint.yaml
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

  e2e:
    name: E2E (Playwright UI smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      # Backend venv so Playwright's webServer can launch uvicorn.
      - name: Install backend (runtime deps)
        working-directory: backend
        run: |
          python -m venv .venv
          .venv/bin/pip install -U pip
          .venv/bin/pip install -r requirements.txt
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci
      - name: Install Playwright Chromium
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      # The extraction spec self-skips without RUN_LLM_E2E (no Ollama in CI);
      # the UI smoke runs against the real backend + Vite dev server.
      - name: Playwright e2e
        working-directory: frontend
        run: npm run e2e
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

  smoke:
    name: Smoke (full-stack docker-compose)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Full-stack smoke test
        env:
          POSTGRES_PASSWORD: smoke_test_pw
        run: ./scripts/smoke.sh
