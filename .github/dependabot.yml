# Dependabot configuration for finsight monorepo.
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
#
# Noise control: each ecosystem produces a SINGLE grouped PR per run (all
# dependencies, all update types), on a monthly cadence. Security updates are
# separate and still arrive promptly regardless of this schedule.

version: 2

updates:
  # ── Python / pip (backend) ────────────────────────────────────────────────
  - package-ecosystem: pip
    directory: /backend
    schedule:
      interval: monthly
      day: monday
      time: "08:00"
      timezone: UTC
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - backend
    # One PR for the whole backend dependency set (incl. major bumps).
    groups:
      backend:
        patterns:
          - "*"
    rebase-strategy: auto
    commit-message:
      prefix: "chore"
      include: scope
    ignore:
      # Pin Python itself via pyproject.toml; skip runtime interpreter bumps.
      - dependency-name: python
        update-types: ["version-update:semver-major"]

  # ── Node / npm (frontend) ─────────────────────────────────────────────────
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: monthly
      day: monday
      time: "08:00"
      timezone: UTC
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - frontend
    groups:
      frontend:
        patterns:
          - "*"
    rebase-strategy: auto
    commit-message:
      prefix: "chore"
      include: scope
    versioning-strategy: increase-if-necessary
    ignore:
      # React 19 is a deliberate framework migration, not a routine bump.
      # Remove these to let Dependabot propose the React 18 -> 19 upgrade.
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/react-dom"
        update-types: ["version-update:semver-major"]

  # ── GitHub Actions ────────────────────────────────────────────────────────
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
      day: tuesday
      time: "08:00"
      timezone: UTC
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - ci
    groups:
      actions:
        patterns:
          - "*"
    rebase-strategy: auto
    commit-message:
      prefix: "chore"
      include: scope
