# Pre-commit hooks for the finsight monorepo.
#
# Bootstrap once:
#   python -m venv backend/.venv && backend/.venv/bin/pip install -r backend/requirements-dev.txt
#   npm --prefix frontend install
#   pipx install pre-commit   # or: pip install pre-commit
#   pre-commit install
#
# Backend hooks use `language: system`, so they run the tools from your active
# environment (install backend/requirements-dev.txt). Frontend hooks shell out to
# the project's npm scripts. This keeps one source of truth: the same commands CI
# and `make` run.
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ["--maxkb=2048"]
      - id: check-merge-conflict

  - repo: local
    hooks:
      # ---------------- backend ----------------
      - id: ruff-check
        name: ruff (lint, backend)
        entry: bash -c 'cd backend && .venv/bin/ruff check --fix app tests scripts'
        language: system
        types: [python]
        files: ^backend/
        pass_filenames: false

      - id: ruff-format
        name: ruff (format, backend)
        entry: bash -c 'cd backend && .venv/bin/ruff format app tests scripts'
        language: system
        types: [python]
        files: ^backend/
        pass_filenames: false

      - id: mypy
        name: mypy (strict, backend)
        entry: bash -c 'cd backend && .venv/bin/mypy app'
        language: system
        types: [python]
        files: ^backend/
        pass_filenames: false

      - id: pyright
        name: pyright (strict, backend)
        entry: bash -c 'cd backend && .venv/bin/pyright app'
        language: system
        types: [python]
        files: ^backend/
        pass_filenames: false

      - id: bandit
        name: bandit (security, backend)
        entry: bash -c 'cd backend && .venv/bin/bandit -c pyproject.toml -r app -q'
        language: system
        types: [python]
        files: ^backend/app/
        pass_filenames: false

      - id: vulture
        name: vulture (dead code, backend)
        entry: bash -c 'cd backend && .venv/bin/vulture'
        language: system
        types: [python]
        files: ^backend/
        pass_filenames: false

      - id: openapi-drift
        name: openapi.json drift (backend)
        entry: bash -c 'cd backend && .venv/bin/python scripts/export_openapi.py && cd .. && git diff --exit-code backend/openapi.json'
        language: system
        files: ^backend/app/
        pass_filenames: false

      # ---------------- frontend ----------------
      - id: eslint
        name: eslint (frontend)
        entry: bash -c 'cd frontend && npm run lint'
        language: system
        files: ^frontend/src/.*\.(ts|tsx)$
        pass_filenames: false

      - id: prettier
        name: prettier (frontend)
        entry: bash -c 'cd frontend && npm run format:check'
        language: system
        files: ^frontend/
        pass_filenames: false

      - id: tsc
        name: tsc (typecheck, frontend)
        entry: bash -c 'cd frontend && npm run typecheck'
        language: system
        files: ^frontend/src/.*\.(ts|tsx)$
        pass_filenames: false

      - id: knip
        name: knip (dead code, frontend)
        entry: bash -c 'cd frontend && npm run knip'
        language: system
        files: ^frontend/
        pass_filenames: false

  # ---------------- managed hooks (isolated environments) ----------------
  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.1
    hooks:
      - id: codespell
        args: ["--config", ".codespellrc"]

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  - repo: https://github.com/alessandrojcm/commitlint-pre-commit-hook
    rev: v9.21.0
    hooks:
      - id: commitlint
        stages: [commit-msg]
        additional_dependencies: ["@commitlint/config-conventional"]
