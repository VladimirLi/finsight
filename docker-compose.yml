# ---------------------------------------------------------------------------
# finsight — full-stack compose
#
# Usage:
#   cp .env.example .env          # fill in API keys
#   docker compose up --build -d
#
# Required env vars (set in .env or shell):
#   POSTGRES_PASSWORD   — postgres superuser password
#   ANTHROPIC_API_KEY   — or OPENAI_API_KEY depending on LLM_PROVIDER
# ---------------------------------------------------------------------------

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  # ── Ollama (local, key-free LLM) ───────────────────────────────────────
  # Enabled via the "local-llm" profile (scripts/quickstart.sh). Lets the whole
  # app run with NO API keys: extraction uses this local model instead of a
  # cloud provider.
  ollama:
    image: ollama/ollama:latest
    profiles: ["local-llm"]
    restart: unless-stopped
    logging: *default-logging
    volumes:
      - ollama_models:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  # One-shot: pulls the model into the shared volume, then exits.
  ollama-init:
    image: ollama/ollama:latest
    profiles: ["local-llm"]
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["/bin/sh", "-c", "ollama pull ${LLM_MODEL:-llama3.2:3b}"]
    restart: "no"

  # ── PostgreSQL ─────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    logging: *default-logging
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-finsight}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: ${POSTGRES_DB:-finsight}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-finsight} -d ${POSTGRES_DB:-finsight}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    # Do NOT expose 5432 to the host in production; backend accesses via internal network.
    # Uncomment for local debugging:
    # ports:
    #   - "5432:5432"

  # ── Backend (FastAPI) ──────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    logging: *default-logging
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-finsight}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@db:5432/${POSTGRES_DB:-finsight}
      UPLOAD_DIR: /app/uploads
      LLM_PROVIDER: ${LLM_PROVIDER:-anthropic}
      LLM_MODEL: ${LLM_MODEL:-claude-sonnet-4-6}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://localhost:11434}
      OCR_DPI: ${OCR_DPI:-200}
      CORS_ORIGINS: '["http://localhost:${FRONTEND_PORT:-3000}","http://frontend"]'
    volumes:
      - uploads:/app/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    # Expose internally only; nginx proxies /api to this service.
    # Uncomment for local debugging:
    # ports:
    #   - "8000:8000"

  # ── Frontend (nginx + React SPA) ──────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    logging: *default-logging
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/index.html"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  db_data:
    driver: local
  uploads:
    driver: local
  ollama_models:
    driver: local
